<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlashPortfolio</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      align-items: center;
      background:
        linear-gradient(135deg, rgba(28, 103, 88, 0.1), transparent 40%),
        linear-gradient(315deg, rgba(10, 102, 194, 0.12), transparent 38%),
        #f6f8fb;
      color: #222;
      display: flex;
      flex-direction: column;
      font-family: Arial, sans-serif;
      justify-content: center;
      margin: 0;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }

    main {
      max-width: 760px;
    }

    h1 {
      color: #102033;
      font-size: clamp(2.4rem, 7vw, 5rem);
      line-height: 1;
      margin: 0 0 1rem;
    }

    p {
      color: #4b5563;
      font-size: clamp(1.1rem, 2vw, 1.35rem);
      line-height: 1.6;
      margin: 0 auto 2rem;
      max-width: 620px;
    }

    a {
      background: #102033;
      border-radius: 999px;
      color: #fff;
      display: inline-flex;
      font-size: 1rem;
      font-weight: 700;
      padding: 0.95rem 1.35rem;
      text-decoration: none;
      transition: background 160ms ease, transform 160ms ease;
    }

    a:hover,
    a:focus {
      background: #0a66c2;
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <main>
    <h1>Welcome to FlashPortfolio</h1>
    <p>Need a polished e-portfolio that presents your skills, projects, and experience clearly? I can create a professional portfolio website built around your goals.</p>
    <a href="https://www.fiverr.com/mismail77/do-an-awesome-website-portfolio-for-you#" target="_blank" rel="noopener noreferrer">Create My E-Portfolio</a>
  </main>
</body>
</html>
